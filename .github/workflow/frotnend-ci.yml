name: frontend ci

on:
  push:
    path:
      - 'client/**'
      - '.github/workflows/frontend-ci.yml'

  jobs:
    frontend-build:
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: client



      steps:
        - name: checkout Code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20

        - name: Install Dependecies
          run: npm install

        - name: Build Frontend
          run: npm run build

        - name: Build Frontend Docker Image
          run: docker build -t lms -frontend:ci .

